name: Daily ATAOL Outreach Pipeline

on:
  schedule:
    - cron: '0 6 * * *'  # 09:00 TR time, every day
  workflow_dispatch:

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Setup credentials
        run: |
          mkdir -p gmail_auth data
          echo '${{ secrets.GMAIL_CREDENTIALS_JSON }}' > gmail_auth/credentials.json
          echo '${{ secrets.GMAIL_TOKEN_JSON }}' > gmail_auth/token.json
          cat > .env << 'ENVEOF'
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          GMAIL_SENDER_EMAIL=sertacgul@strategythrust.com
          GMAIL_CREDENTIALS_PATH=gmail_auth/credentials.json
          GMAIL_TOKEN_PATH=gmail_auth/token.json
          NOTIFICATION_EMAIL=sertacgul@strategythrust.com
          MAX_EMAILS_PER_DAY=70
          SCRAPE_DELAY_SECONDS=1
          GEMINI_MODEL=gemini-2.0-flash
          DATABASE_PATH=data/ataol.db
          GIST_ID=${{ secrets.GIST_ID }}
          ENVEOF

      - name: Import existing data from dashboard repo
        env:
          GH_TOKEN: ${{ secrets.GIST_PAT }}
        run: |
          git clone --depth 1 https://x-access-token:${GH_TOKEN}@github.com/sertacgul/strategythrust-dashboard.git /tmp/dashboard || true
          if [ -f /tmp/dashboard/data/emails.json ]; then
            cp /tmp/dashboard/data/emails.json data/dashboard_import.json
            echo "Dashboard data imported"
          fi

      - name: Import existing data and create follow-ups
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_TOKEN: ${{ secrets.GIST_PAT }}
          GIST_ID: ${{ secrets.GIST_ID }}
        run: |
          python -c "
          import sys; sys.path.insert(0, '.')
          from database import init_db; init_db()
          try:
            from scripts.sync_to_github import import_full_from_gist
            import_full_from_gist()
          except Exception as e:
            print(f'Import error: {e}')
          from pipeline.followup import create_pending_followups
          create_pending_followups()
          "

      - name: Send approved emails (weekdays only)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python -c "
          import sys; sys.path.insert(0, '.')
          from database import init_db, get_db; init_db()
          from pipeline.sender import send_approved_batch
          db = get_db()
          send_approved_batch(db)
          db.close()
          "

      - name: Research new companies
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python -c "
          import sys; sys.path.insert(0, '.')
          from database import init_db; init_db()
          from pipeline.research import run_research
          run_research(max_queries=2, region='tr-tr', language='tr')
          run_research(max_queries=5, region='wt-wt', language='en')
          "

      - name: Scrape websites
        run: |
          python -c "
          import sys; sys.path.insert(0, '.')
          from database import init_db; init_db()
          from pipeline.scraper import run_scraping
          run_scraping(max_leads=40)
          "

      - name: Analyze companies
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python -c "
          import sys; sys.path.insert(0, '.')
          from database import init_db; init_db()
          from pipeline.analyzer import run_analysis
          run_analysis(max_leads=40)
          "

      - name: Generate emails
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python -c "
          import sys; sys.path.insert(0, '.')
          from database import init_db; init_db()
          from pipeline.email_generator import run_email_generation
          run_email_generation(max_leads=40)
          "

      - name: Push results to dashboard repo
        env:
          GH_TOKEN: ${{ secrets.GIST_PAT }}
          GIST_ID: ${{ secrets.GIST_ID }}
        run: |
          python -c "
          import sys; sys.path.insert(0, '.')
          from database import init_db; init_db()
          from scripts.sync_to_github import export_data_to_gist
          export_data_to_gist()
          "
