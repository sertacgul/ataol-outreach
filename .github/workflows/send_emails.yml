name: Send Approved Emails

on:
  schedule:
    # Weekdays only, 3 times for timezone coverage
    - cron: '0 7 * * 1-5'   # 10:00 TR
    - cron: '0 11 * * 1-5'  # 14:00 TR
    - cron: '0 15 * * 1-5'  # 18:00 TR
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Setup credentials
        run: |
          mkdir -p gmail_auth data
          echo '${{ secrets.GMAIL_CREDENTIALS_JSON }}' > gmail_auth/credentials.json
          echo '${{ secrets.GMAIL_TOKEN_JSON }}' > gmail_auth/token.json
          cat > .env << 'ENVEOF'
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          GMAIL_SENDER_EMAIL=sertacgul@strategythrust.com
          GMAIL_CREDENTIALS_PATH=gmail_auth/credentials.json
          GMAIL_TOKEN_PATH=gmail_auth/token.json
          MAX_EMAILS_PER_DAY=70
          GEMINI_MODEL=gemini-1.5-flash
          DATABASE_PATH=data/ataol.db
          GIST_ID=${{ secrets.GIST_ID }}
          ENVEOF

      - name: Pull data from dashboard repo
        env:
          GH_TOKEN: ${{ secrets.GIST_PAT }}
        run: |
          git clone --depth 1 https://x-access-token:${GH_TOKEN}@github.com/sertacgul/strategythrust-dashboard.git /tmp/dashboard || true
          if [ -f /tmp/dashboard/data/emails.json ]; then
            cp /tmp/dashboard/data/emails.json data/dashboard_import.json
            echo "Dashboard data imported"
          fi

      - name: Import data from gist
        env:
          GH_TOKEN: ${{ secrets.GIST_PAT }}
          GIST_ID: ${{ secrets.GIST_ID }}
        run: |
          python -c "
          import sys; sys.path.insert(0, '.')
          from database import init_db; init_db()
          from scripts.sync_to_github import import_full_from_gist
          import_full_from_gist()
          "

      - name: Send approved emails
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python -c "
          import sys; sys.path.insert(0, '.')
          from database import init_db, get_db; init_db()
          from pipeline.sender import send_approved_batch
          db = get_db()
          sent = send_approved_batch(db)
          db.close()
          print(f'Sent {sent} emails')
          "

      - name: Push updated data to dashboard repo
        env:
          GH_TOKEN: ${{ secrets.GIST_PAT }}
          GIST_ID: ${{ secrets.GIST_ID }}
        run: |
          python -c "
          import sys; sys.path.insert(0, '.')
          from database import init_db; init_db()
          from scripts.sync_to_github import export_data_to_gist
          export_data_to_gist()
          "
