services:
  - type: web
    name: ataol-b2b-api
    env: python
    plan: free
    rootDir: b2b_engine_prototype
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ataol-db
          property: connectionString

databases:
  - name: ataol-db
    plan: free
    databaseName: ataol_prototype
    user: ataol_user
